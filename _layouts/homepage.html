<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    {% if page.summary %}
      <meta name="description" content="{{ page.summary }}">
    {% endif %}
    <link href="css/bootstrap.min.css" rel="stylesheet" media="screen">
    <style>
      body { color: #4A4A4A; }
      a { color: #1980e6; }
      a:hover { color: #0f4d8a; }
      .label-as-badge { border-radius: 1em;}

.vertical-center {
  min-height: 100vh;
  /* Make it a flex container */
  display: -webkit-box;
  display: -moz-box;
  display: -ms-flexbox;
  display: -webkit-flex;
  display: flex;

  
  /* Align the bootstrap's container vertically */
    -webkit-box-align : center;
  -webkit-align-items : center;
       -moz-box-align : center;
       -ms-flex-align : center;
          align-items : center;
  
  /* In legacy web browsers such as Firefox 9
     we need to specify the width of the flex container */
  width: 100%;
  margin-left: 15px;
  
  /* Also 'margin: 0 auto' doesn't have any effect on flex items in such web browsers
     hence the bootstrap's container won't be aligned to the center anymore.
  
     Therefore, we should use the following declarations to get it centered again */
         -webkit-box-pack : center;
            -moz-box-pack : center;
            -ms-flex-pack : center;
  -webkit-justify-content : center;
          justify-content : center;
  transition: min-height 0.8s ease-in-out;
}
        
        .label-purple {background-color: #9b59b6;}
    </style>
    <script   src="http://code.jquery.com/jquery-3.1.1.min.js"   integrity="sha256-hVVnYaiADRTO2PzUGmuLJr8BLUSjGIZsDYGmIJLv2b8="   crossorigin="anonymous"></script>
    <script type="text/javascript">
      $(window).on('scroll', function() {
        if ($(window).scrollTop() > 50) {
          $('#scrolldown').fadeOut();
          $('#myhead').css("min-height", "0vh");
        } else {
          $('#scrolldown').fadeIn();
          $('#myhead').css("min-height", "100vh");
        }
      });
    </script>

    <style>
    body {
      background: url(img/features_bg1.svg) repeat 0 0;
    }
    </style>
